<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mehdi-san | Japanese Learning</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1a1a;
    --card: #2d2d2d;
    --text: #ffffff;
    --green: #58cc02;
    --red: #ff4b4b;
    --blue: #1cb0f6;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Quicksand', sans-serif; margin: 0; padding: 20px; text-align: center; }
  .logo { font-size: 24px; font-weight: bold; margin-bottom: 20px; color: var(--green); display: flex; align-items: center; justify-content: center; gap: 10px; }
  .fennec-icon { width: 50px; height: 50px; background: gold; border-radius: 50%; border: 3px solid #fff; }
  .stats { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
  .card { background: var(--card); padding: 40px; border-radius: 20px; cursor: pointer; border: 2px solid #444; }
  .btn { background: var(--green); color: #fff; border: none; padding: 15px 30px; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 20px; }
  .hidden { display: none; }
  #char-display { font-size: 80px; margin: 20px; }
</style>
</head>
<body>

<div class="logo">
  <div class="fennec-icon">🦊</div> Mehdi-san
</div>

<div class="stats">
  <div>Lives: <span id="hearts">❤️❤️❤️</span></div>
  <div>XP: <span id="xp">0</span></div>
</div>

<div id="game-container">
  <div class="card" onclick="playAudio()">
    <div id="char-display">🌸</div>
    <h2 id="word-text">Asa</h2>
  </div>
  <div id="options"></div>
</div>

<div id="result-screen" class="hidden">
  <div id="char-display">🏆</div>
  <h1>Bravo, Mehdi-san!</h1>
  <p>You have qualified for the next round.</p>
  <button class="btn" onclick="location.reload()">Next Stage</button>
</div>

<script>
let hearts = 3;
let xp = 0;

// Audio Effects
const correctSound = new Audio('https://www.soundjay.com/buttons/sounds/button-10.mp3');
const wrongSound = new Audio('https://www.soundjay.com/buttons/sounds/button-16.mp3');

function playAudio() {
  const utterance = new SpeechSynthesisUtterance("Asa");
  utterance.lang = 'ja-JP';
  window.speechSynthesis.speak(utterance);
}

function checkAnswer(isCorrect) {
  if (isCorrect) {
    correctSound.play();
    xp += 10;
    alert("Great! You are ready for the test, Mehdi-san!");
  } else {
    wrongSound.play();
    hearts--;
    document.getElementById('hearts').textContent = "❤️".repeat(hearts);
    if (hearts === 0) alert("Game Over!");
  }
  document.getElementById('xp').textContent = xp;
}

// Future feature ideas discussed:
// 1. Writing mode: Implement an <input> field to type the Romaji.
// 2. Voice Recognition: Use Web Speech API (SpeechRecognition) for oral answers.
</script>
</body>
</html>
