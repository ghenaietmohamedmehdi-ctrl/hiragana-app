<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mehdi San | メヒサン</title>
<!-- ... (كل الـ <style> السابقة تبقى كما هي) ... -->
</head>
<body>
<!-- ... (كل الـ HTML السابق يبقى كما هو) ... -->

<script>
// ... (كل الكود السابق حتى دالة renderQuestion) ...

/* ================= IMPROVED KANA KEYBOARD ================= */
const KANA_TABLE = [
  ["あ", "い", "う", "え", "お"],
  ["か", "き", "く", "け", "こ"],
  ["さ", "し", "す", "せ", "そ"],
  ["た", "ち", "つ", "て", "と"],
  ["な", "に", "ぬ", "ね", "の"],
  ["は", "ひ", "ふ", "へ", "ほ"],
  ["ま", "み", "む", "め", "も"],
  ["や", "ゆ", "よ"],
  ["ら", "り", "る", "れ", "ろ"],
  ["わ", "を", "ん"]
];

const DAKUTEN_TABLE = [
  ["が", "ぎ", "ぐ", "げ", "ご"],
  ["ざ", "じ", "ず", "ぜ", "ぞ"],
  ["だ", "ぢ", "づ", "で", "ど"],
  ["ば", "び", "ぶ", "べ", "ぼ"],
  ["ぱ", "ぴ", "ぷ", "ぺ", "ぽ"]
];

function buildQuestions(pool){
  let allWords = [];
  GROUP_ORDER.forEach(key=> DATA[key].words.forEach((ww,idx)=> allWords.push({...ww, group:key, id:wordId(key,idx)})));
  return pool.map((w, i)=>{
    const type = i % 4;
    if(type===3){
      return { word:w, type, correct:w.k };
    }
    let correct, field;
    if(type===0){ correct = meaningStr(w); field=null; }
    else if(type===1){ correct = w.k; field='k'; }
    else { correct = w.k; field='k'; }
    let candidates = allWords.filter(ww=> ww.id!==w.id);
    candidates = shuffle(candidates).slice(0,3);
    let optVals = candidates.map(c=> type===0? meaningStr(c) : c[field]);
    let options = shuffle([correct, ...optVals]);
    return { word:w, type, correct, options };
  });
}

function renderQuestion(){
  const q = state.quiz.questions[state.quiz.index];
  // ... (الكود السابق حتى if(q.type===3) ...

  if(q.type===3){  // سؤال كتابة
    promptEl.textContent = 'اكتب هذه الكلمة بالهيراغانا';
    mainEl.textContent = q.word.e + ' ' + q.word.en;
    subEl.textContent = q.word.m;
    
    const box = document.createElement('div');
    box.className = 'type-wrap';
    box.innerHTML = `
      <div class="kana-answer-box" id="kanaAnswerBox">&nbsp;</div>
      <div class="kana-keyboard" id="kanaKeyboard" style="grid-template-columns:repeat(5,1fr); gap:6px;"></div>
      <div class="kana-controls">
        <button class="btn btn-gray" id="kanaDelete">⌫ حذف</button>
        <button class="btn btn-blue" id="kanaSubmit">تحقّق ✓</button>
      </div>`;
    optWrap.appendChild(box);

    let typed = '';
    const answerBox = document.getElementById('kanaAnswerBox');
    const kb = document.getElementById('kanaKeyboard');

    // Main Kana
    KANA_TABLE.forEach(row => {
      row.forEach(ch => {
        const key = document.createElement('button');
        key.className = 'kana-key';
        key.textContent = ch;
        key.onclick = () => { typed += ch; answerBox.textContent = typed; };
        kb.appendChild(key);
      });
    });

    // Dakuten Section
    const dakutenTitle = document.createElement('div');
    dakutenTitle.style.cssText = 'grid-column:1/-1; text-align:center; margin:8px 0 4px; font-size:13px; color:#ffc800;';
    dakutenTitle.textContent = 'ـ dakuten ـ';
    kb.appendChild(dakutenTitle);

    DAKUTEN_TABLE.forEach(row => {
      row.forEach(ch => {
        const key = document.createElement('button');
        key.className = 'kana-key';
        key.textContent = ch;
        key.style.background = '#3b2e5e';
        key.onclick = () => { typed += ch; answerBox.textContent = typed; };
        kb.appendChild(key);
      });
    });

    document.getElementById('kanaDelete').onclick = () => {
      typed = typed.slice(0, -1);
      answerBox.textContent = typed || '\u00A0';
    };

    document.getElementById('kanaSubmit').onclick = () => {
      answerQuestion(typed.trim(), document.getElementById('kanaSubmit'), true);
    };
    return;
  }

  // ... (باقي أنواع الأسئلة كما هي)
}

// باقي الكود كما هو...
</script>
</body>
</html>
