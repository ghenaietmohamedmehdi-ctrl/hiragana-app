<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mehdi San | メヒサン</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Baloo+2:wght@500;600;700;800&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#58cc02; --green-dark:#3f9701;
    --blue:#1cb0f6; --blue-dark:#0d95d6;
    --red:#ff4b4b; --red-dark:#e63e3e;
    --gold:#ffc800; --gold-dark:#e0ac00;
    --ink:#eef1f8;
    --gray:#2b3550; --gray-dark:#455072;
    --bg:#0e1526; --bg2:#141d33;
    --card:#182238; --card-dim:#101830;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background: radial-gradient(circle at 15% 0%, rgba(28,176,246,0.10), transparent 45%),
                radial-gradient(circle at 90% 100%, rgba(255,75,75,0.08), transparent 45%),
                var(--bg);
    background-attachment:fixed;
    font-family:'Baloo 2','Cairo','Zen Maru Gothic',sans-serif;
    color:var(--ink);
    min-height:100vh;
    overflow-x:hidden;
  }
  button{font-family:inherit;}
  
  /* Topbar & Stats */
  .topbar{position:sticky; top:0; z-index:20; display:flex; align-items:center; justify-content:space-between; padding:8px 16px; background:var(--bg2); border-bottom:2px solid var(--gray);}
  .stat-pill{display:flex; align-items:center; gap:5px; background:var(--card); border:2px solid var(--gray); border-radius:14px; padding:4px 10px; font-weight:800; font-size:13px; color:var(--ink);}
  .stat-pill.gold{ color:var(--gold); border-color:#5a4a12; }
  .stat-pill.red{ color:#ff8080; border-color:#5a1f1f; }

  /* Quiz Styling */
  main{ max-width:640px; margin:0 auto; padding:18px 0 60px; }
  .view{ display:none; }
  .view.active{ display:block; }
  .quiz-topbar{ display:flex; align-items:center; gap:12px; margin-bottom:20px; padding:0 16px; }
  .quiz-progress{ flex:1; height:14px; background:var(--gray); border-radius:8px; overflow:hidden; }
  .quiz-progress-fill{ height:100%; background:var(--green); width:0%; transition:width .3s; }
  .quiz-hearts{ font-size:15px; font-weight:800; color:#ff8080; white-space:nowrap; }
  .quiz-x{ background:none; border:none; font-size:20px; color:#7f8bab; cursor:pointer; }
  
  .quiz-question-box{ background:var(--card); border:2px solid var(--gray); border-radius:20px; padding:28px 18px; text-align:center; margin:0 16px 22px; }
  .quiz-prompt{ font-size:13px; font-weight:700; color:#8895b3; margin-bottom:10px; }
  .quiz-main{ font-family:'Zen Maru Gothic',sans-serif; font-size:46px; font-weight:900; color:#fff; text-align:center; letter-spacing:1px; word-break:break-word; }
  .quiz-sub{ font-size:16px; color:#9fb0d4; margin-top:8px; font-weight:700; }
  .quiz-speak{ margin-top:14px; background:var(--blue); color:#fff; border:none; border-radius:50%; width:46px; height:46px; font-size:19px; cursor:pointer; box-shadow:0 4px 0 var(--blue-dark); }

  /* Keyboard Styling */
  .kana-answer-box{min-height:54px; border:2px dashed var(--gold); border-radius:12px; padding:12px; font-size:28px; text-align:center; letter-spacing:4px; margin-bottom:12px; font-family:'Zen Maru Gothic', sans-serif;}
  .kana-keyboard{display:grid; grid-template-columns:repeat(5,1fr); gap:7px; max-width:380px; margin:0 auto;}
  .kana-key{background:var(--card); border:2px solid var(--gray); border-radius:10px; padding:12px 0; font-size:19px; font-weight:800; color:#fff; cursor:pointer; font-family:'Zen Maru Gothic',sans-serif;}
  .kana-key:active{transform:translateY(2px); background:var(--blue);}
  .kana-controls{display:flex; gap:12px; justify-content:center; margin-top:12px;}
  .btn{display:inline-block; border:none; border-radius:16px; padding:13px 20px; font-weight:800; font-size:15px; cursor:pointer; color:#fff; box-shadow:0 5px 0 var(--sc);}
  .btn-blue{ background:var(--blue); --sc:var(--blue-dark); }
  .btn-gray{ background:var(--card); color:var(--ink); border:2px solid var(--gray); box-shadow:0 5px 0 var(--gray); }
  
  .options{ display:flex; flex-direction:column; gap:12px; padding:0 16px; }
  .opt-btn{ background:var(--card); border:2px solid var(--gray); border-radius:14px; padding:16px; font-family:'Zen Maru Gothic',sans-serif; font-size:24px; font-weight:800; cursor:pointer; text-align:center; box-shadow:0 4px 0 var(--gray); color:#fff; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Mehdi San</div>
  <div class="stats">
    <div class="stat-pill gold">⭐ <span id="xpVal">0</span> XP</div>
    <div class="stat-pill">🔥 <span id="streakVal">0</span></div>
    <div class="stat-pill red">❤️ <span id="heartsVal">6</span></div>
  </div>
</div>

<main>
  <div class="view active" id="view-quiz">
    <div class="quiz-topbar">
      <button class="quiz-x" id="quizExit">✕</button>
      <div class="quiz-progress"><div class="quiz-progress-fill" id="quizProgressFill"></div></div>
      <div class="quiz-hearts">❤️ <span id="quizHearts">6</span></div>
    </div>
    <div class="quiz-question-box">
      <div class="quiz-prompt" id="quizPrompt">اختر المعنى الصحيح</div>
      <div class="quiz-main" id="quizMain">—</div>
      <div class="quiz-sub" id="quizSub"></div>
      <button class="quiz-speak" id="quizSpeakBtn">🔊</button>
    </div>
    <div class="options" id="quizOptions"></div>
  </div>
</main>

<script>
/* ================= DATA ================= */
const DATA = {
  seion: { name:"الأصوات الأساسية", icon:"🗻", color:"#58cc02", shadow:"#3f9701", words:[
     {k:"あさ", r:"a sa", en:"morning", m:"صباح", e:"🌅", d:1},
     {k:"ねこ", r:"ne ko", en:"cat", m:"قطة", e:"🐱", d:1}
  ] }
};

/* ================= KANA TABLES ================= */
const KANA_TABLE = [
  ["あ", "い", "う", "え", "お"],
  ["か", "き", "く", "け", "こ"],
  ["さ", "し", "す", "せ", "そ"],
  ["た", "ち", "つ", "て", "と"],
  ["な", "に", "ぬ", "ね", "の"],
  ["は", "ひ", "ふ", "へ", "ほ"],
  ["ま", "み", "む", "め", "も"],
  ["や", "ゆ", "よ"],
  ["ら", "り", "る", "れ", "ろ"],
  ["わ", "を", "ん"]
];
const DAKUTEN_TABLE = [
  ["が", "ぎ", "ぐ", "げ", "ご"],
  ["ざ", "じ", "ず", "ぜ", "ぞ"],
  ["だ", "ぢ", "づ", "で", "ど"],
  ["ば", "び", "ぶ", "べ", "ぼ"],
  ["ぱ", "ぴ", "ぷ", "ぺ", "ぽ"]
];

/* ================= STATE & MOCK LOGIC ================= */
let state = {
  hearts: 6,
  quiz: {
    index: 0,
    questions: [
      { type: 0, word: {k:"あさ", e:"🌅", en:"morning", m:"صباح"} },
      { type: 3, word: {k:"ねこ", e:"🐱", en:"cat", m:"قطة"} }
    ]
  }
};

/* ================= QUIZ RENDER ================= */
function renderQuestion(){
  const q = state.quiz.questions[state.quiz.index];
  document.getElementById('quizProgressFill').style.width = (state.quiz.index/state.quiz.questions.length*100)+'%';
  document.getElementById('quizHearts').textContent = Math.max(state.hearts,0);
  const promptEl = document.getElementById('quizPrompt');
  const mainEl = document.getElementById('quizMain');
  const subEl = document.getElementById('quizSub');
  const speakBtn = document.getElementById('quizSpeakBtn');
  const optWrap = document.getElementById('quizOptions');
  
  optWrap.innerHTML = '';
  
  if(q.type === 3){
    promptEl.textContent = 'اكتب هذه الكلمة بالهيراغانا';
    mainEl.textContent = q.word.e + ' ' + q.word.en;
    subEl.textContent = q.word.m;
    speakBtn.style.display = 'inline-block';
    buildTypingKeyboard(q.word.k);
    return;
  }
  
  promptEl.textContent = 'ما معنى هذه الكلمة؟';
  mainEl.textContent = q.word.k;
  subEl.textContent = q.word.en;
}

function buildTypingKeyboard(correctWord){
  const optWrap = document.getElementById('quizOptions');
  let typed = '';
  const box = document.createElement('div');
  box.innerHTML = `
    <div class="kana-answer-box" id="kanaAnswerBox">&nbsp;</div>
    <div class="kana-keyboard" id="kanaKeyboard"></div>
    <div class="kana-controls">
      <button class="btn btn-gray" id="kanaDelete">⌫ حذف</button>
      <button class="btn btn-blue" id="kanaSubmit">تحقّق ✓</button>
    </div>`;
  optWrap.appendChild(box);
  
  const answerBox = document.getElementById('kanaAnswerBox');
  const kb = document.getElementById('kanaKeyboard');
  
  // Render Kana
  KANA_TABLE.forEach(row => {
    row.forEach(ch => {
      const key = document.createElement('button');
      key.className = 'kana-key';
      key.textContent = ch;
      key.onclick = () => { typed += ch; answerBox.textContent = typed; };
      kb.appendChild(key);
    });
  });
  
  // Dakuten
  const header = document.createElement('div');
  header.style = 'grid-column:1/-1; text-align:center; color:#ffc800; margin:10px 0; font-size:12px;';
  header.textContent = '── Dakuten ──';
  kb.appendChild(header);
  
  DAKUTEN_TABLE.forEach(row => {
    row.forEach(ch => {
      const key = document.createElement('button');
      key.className = 'kana-key';
      key.textContent = ch;
      key.style.background = '#4c1d95';
      key.onclick = () => { typed += ch; answerBox.textContent = typed; };
      kb.appendChild(key);
    });
  });
  
  document.getElementById('kanaDelete').onclick = () => {
    typed = typed.slice(0, -1);
    answerBox.textContent = typed || '\u00A0';
  };
  
  document.getElementById('kanaSubmit').onclick = () => {
    if(typed.trim() === correctWord){
      alert('صحيح!');
      state.quiz.index++;
      renderQuestion();
    } else {
      alert('حاول مرة أخرى!');
    }
  };
}

// Init
renderQuestion();
</script>
</body>
</html>
