<script>
// ... (الكود السابق كاملاً حتى renderQuestion) ...

function renderQuestion(){
  const q = state.quiz.questions[state.quiz.index];
  document.getElementById('quizProgressFill').style.width = (state.quiz.index/state.quiz.questions.length*100)+'%';
  document.getElementById('quizHearts').textContent = Math.max(state.hearts,0);

  const promptEl = document.getElementById('quizPrompt');
  const mainEl = document.getElementById('quizMain');
  const subEl = document.getElementById('quizSub');
  const speakBtn = document.getElementById('quizSpeakBtn');
  const optWrap = document.getElementById('quizOptions');
  optWrap.innerHTML = '';

  // إخفاء الكيبورد افتراضياً
  hideKeyboard();

  if(q.type === 0){
    promptEl.textContent = 'ما معنى هذه الكلمة؟ (English / عربي)';
    mainEl.textContent = q.word.k; 
    subEl.textContent = q.word.r + ' · ' + q.word.e;
    speakBtn.style.display = 'inline-block';
    speakBtn.onclick = () => speak(q.word.k, mainEl);
    mainEl.onclick = () => speak(q.word.k, mainEl);
    speak(q.word.k, mainEl);
  } 
  else if(q.type === 1){
    promptEl.textContent = 'اختر الكلمة اليابانية الصحيحة';
    mainEl.textContent = q.word.en + ' / ' + q.word.m; 
    subEl.textContent = q.word.e;
    speakBtn.style.display = 'none';
  } 
  else if(q.type === 2){
    promptEl.textContent = '🔊 استمع واختر الكتابة الصحيحة';
    mainEl.textContent = '🔊'; 
    subEl.textContent = '';
    speakBtn.style.display = 'inline-block';
    speakBtn.onclick = () => speak(q.word.k, mainEl);
    speak(q.word.k, mainEl);
  } 
  else if(q.type === 3){  // ← سؤال الكتابة فقط
    promptEl.textContent = 'اكتب هذه الكلمة بالهيراغانا';
    mainEl.textContent = q.word.e + ' ' + q.word.en;
    subEl.textContent = q.word.m;
    speakBtn.style.display = 'inline-block';
    speakBtn.onclick = () => speak(q.word.k, mainEl);

    showTypingKeyboard(q);
    return; // لا نضيف أزرار الاختيار
  }

  // أزرار الاختيار العادية
  q.options.forEach(opt => {
    const b = document.createElement('button');
    b.className = 'opt-btn';
    b.textContent = opt;
    b.onclick = () => answerQuestion(opt, b, false);
    optWrap.appendChild(b);
  });
}

/* ================= لوحة الكتابة (تظهر فقط في أسئلة الكتابة) ================= */
function showTypingKeyboard(q){
  const optWrap = document.getElementById('quizOptions');
  let typed = '';

  const box = document.createElement('div');
  box.className = 'type-wrap';
  box.innerHTML = `
    <div class="kana-answer-box" id="kanaAnswerBox" style="min-height:54px; font-size:28px;">&nbsp;</div>
    <div class="kana-keyboard" id="kanaKeyboard" style="display:grid; grid-template-columns:repeat(5,1fr); gap:7px; max-width:380px; margin:12px auto;"></div>
    <div class="kana-controls" style="display:flex; gap:12px; justify-content:center; margin-top:12px;">
      <button class="btn btn-gray" id="kanaDelete" style="padding:12px 24px;">⌫ حذف</button>
      <button class="btn btn-blue" id="kanaSubmit" style="padding:12px 32px;">تحقّق ✓</button>
    </div>`;

  optWrap.appendChild(box);

  const answerBox = document.getElementById('kanaAnswerBox');
  const kb = document.getElementById('kanaKeyboard');

  // اللوحة الرئيسية
  KANA_TABLE.forEach(row => {
    row.forEach(ch => {
      const key = createKanaKey(ch, () => { typed += ch; answerBox.textContent = typed; });
      kb.appendChild(key);
    });
  });

  // Dakuten
  const dakutenHeader = document.createElement('div');
  dakutenHeader.style = 'grid-column: 1 / -1; text-align:center; color:#fcd34d; font-size:13px; margin:8px 0 4px;';
  dakutenHeader.textContent = '── Dakuten ──';
  kb.appendChild(dakutenHeader);

  DAKUTEN_TABLE.forEach(row => {
    row.forEach(ch => {
      const key = createKanaKey(ch, () => { typed += ch; answerBox.textContent = typed; });
      key.style.background = '#4c1d95';
      kb.appendChild(key);
    });
  });

  document.getElementById('kanaDelete').onclick = () => {
    typed = typed.slice(0, -1);
    answerBox.textContent = typed || '\u00A0';
  };

  document.getElementById('kanaSubmit').onclick = () => {
    answerQuestion(typed.trim(), null, true);
  };
}

function createKanaKey(char, onClick){
  const key = document.createElement('button');
  key.className = 'kana-key';
  key.textContent = char;
  key.style.fontSize = '19px';
  key.style.padding = '12px 0';
  key.onclick = onClick;
  return key;
}

function hideKeyboard(){
  // يتم التحكم بها تلقائياً عند إعادة بناء optWrap
}

// ... (باقي الكود كما هو)
</script>
